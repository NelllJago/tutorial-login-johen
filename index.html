<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorial Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 12px;
  }
  h1 {
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 700;
    color: #fff;
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 0 0 20px #00f0ff44;
  }
  h1 span { color: #00f0ff; }
  .sub { color: #555; font-size: 13px; margin-bottom: 20px; text-align: center; }
  .video-card {
    width: 100%;
    max-width: 720px;
    background: #0e1118;
    border: 1px solid #ffffff10;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }
  .video-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; /* 16:9 */
    height: 0;
  }
  .video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  .footer { margin-top: 20px; font-size: 11px; color: #333; }
</style>
</head>
<body>

<h1>Tutorial Login <span>Zimbra</span> & <span style="color:#ff9f2e">PUBG</span></h1>
<p class="sub">Tonton video berikut sebelum melanjutkan</p>

<div class="video-card">
  <div class="video-wrapper">
    <iframe src="https://drive.google.com/file/d/12gDLaEaZJXTc5YO1IV5AoLcycB19BGJr/preview" allowfullscreen allow="autoplay"></iframe>
  </div>
</div>

<div class="footer">Halaman ini hanya untuk keperluan internal.</div>

</body>
</html>
